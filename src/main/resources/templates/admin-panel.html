<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل مدیریت | نقشه گرد</title>

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'persian-navy': '#0A0A1A',
            'persian-dark': '#111128',
            'persian-night': '#1A1A3A',
            'persian-teal': '#1A6B6B',
            'persian-turquoise': '#2A9D8F',
            'persian-saffron': '#D4A373',
            'persian-gold': '#C9A84C',
            'persian-lapis': '#1B2A4A',
            'persian-rose': '#BC6C8C',
            'persian-cream': '#F5EDE0',
          },
          fontFamily: {
            'persian': ['Vazirmatn', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Vazirmatn', system-ui, sans-serif;
      background: linear-gradient(135deg, #0A0A1A 0%, #111128 50%, #0A0A1A 100%);
      min-height: 100vh;
    }

    /* پس‌زمینه با ستاره */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
              radial-gradient(1.5px 1.5px at 10% 20%, rgba(255,255,255,0.2), transparent),
              radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.15), transparent),
              radial-gradient(2px 2px at 40% 10%, rgba(255,255,255,0.25), transparent);
      background-size: 100% 100%;
      opacity: 0.3;
      z-index: 0;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      position: fixed;
      right: 0;
      top: 0;
      width: 260px;
      height: 100%;
      background: rgba(10, 10, 26, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 1px solid rgba(201, 168, 76, 0.06);
      z-index: 1000;
      padding: 70px 0 20px;
      overflow-y: auto;
      transition: all 0.3s ease;
    }

    .sidebar::-webkit-scrollbar {
      width: 3px;
    }
    .sidebar::-webkit-scrollbar-thumb {
      background: #C9A84C;
      border-radius: 10px;
    }

    .sidebar-header {
      text-align: center;
      padding: 16px 20px 20px;
      border-bottom: 1px solid rgba(201, 168, 76, 0.06);
    }

    .sidebar-header .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1.3rem;
      font-weight: 900;
    }

    .sidebar-header .logo .gold {
      color: #C9A84C;
    }
    .sidebar-header .logo .cream {
      color: #F5EDE0;
    }

    .sidebar-header .user-info {
      color: rgba(245, 237, 224, 0.3);
      font-size: 0.75rem;
      margin-top: 6px;
    }

    .sidebar-header .user-info strong {
      color: rgba(245, 237, 224, 0.6);
    }

    /* Sidebar Navigation */
    .sidebar-nav {
      list-style: none;
      padding: 8px 12px;
    }

    .sidebar-nav li {
      margin-bottom: 2px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      color: rgba(245, 237, 224, 0.4);
      text-decoration: none;
      transition: all 0.3s ease;
      font-size: 0.85rem;
      cursor: pointer;
      position: relative;
    }

    .sidebar-nav a:hover {
      background: rgba(201, 168, 76, 0.06);
      color: rgba(245, 237, 224, 0.7);
    }

    .sidebar-nav a.active {
      background: rgba(201, 168, 76, 0.08);
      color: #C9A84C;
      border-left: 3px solid #C9A84C;
    }

    .sidebar-nav a .badge-count {
      background: rgba(231, 111, 81, 0.15);
      color: #E76F51;
      padding: 0 8px;
      border-radius: 50px;
      font-size: 0.6rem;
      font-weight: 700;
      margin-right: auto;
      min-width: 20px;
      text-align: center;
    }

    .sidebar-nav a .icon {
      width: 20px;
      text-align: center;
      font-size: 0.9rem;
    }

    .sidebar-footer {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 12px 16px;
      border-top: 1px solid rgba(201, 168, 76, 0.05);
    }

    .sidebar-footer a {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(245, 237, 224, 0.25);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 0.8rem;
      transition: all 0.3s ease;
    }

    .sidebar-footer a:hover {
      color: rgba(245, 237, 224, 0.5);
      background: rgba(201, 168, 76, 0.05);
    }

    /* ===== Top Bar ===== */
    .topbar {
      position: fixed;
      top: 0;
      right: 260px;
      left: 0;
      height: 60px;
      background: rgba(10, 10, 26, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(201, 168, 76, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 999;
    }

    .topbar-title {
      color: #F5EDE0;
      font-size: 1rem;
      font-weight: 700;
    }

    .topbar-title i {
      color: #C9A84C;
      margin-left: 8px;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-user .username {
      color: rgba(245, 237, 224, 0.6);
      font-size: 0.85rem;
    }

    .topbar-user .role-badge {
      padding: 2px 12px;
      border-radius: 50px;
      font-size: 0.65rem;
      font-weight: 700;
    }

    .role-badge.admin {
      background: rgba(201, 168, 76, 0.15);
      color: #C9A84C;
      border: 1px solid rgba(201, 168, 76, 0.15);
    }

    .role-badge.moderator {
      background: rgba(42, 157, 143, 0.15);
      color: #2A9D8F;
      border: 1px solid rgba(42, 157, 143, 0.15);
    }

    .topbar-user .logout-btn {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.1);
      color: #F87171;
      padding: 6px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      transition: all 0.3s ease;
    }

    .topbar-user .logout-btn:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.2);
    }

    /* ===== Main Content ===== */
    .main-content {
      margin-right: 260px;
      padding: 80px 24px 30px;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ===== Glass Cards ===== */
    .glass-card {
      background: rgba(26, 26, 58, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(201, 168, 76, 0.06);
      border-radius: 16px;
    }

    /* ===== Stats Grid ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: rgba(26, 26, 58, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(201, 168, 76, 0.06);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      border-color: rgba(201, 168, 76, 0.12);
      transform: translateY(-2px);
    }

    .stat-card .stat-icon {
      font-size: 1.5rem;
      color: rgba(201, 168, 76, 0.3);
      margin-bottom: 4px;
    }

    .stat-card .stat-number {
      font-size: 1.5rem;
      font-weight: 800;
      color: #F5EDE0;
    }

    .stat-card .stat-label {
      color: rgba(245, 237, 224, 0.25);
      font-size: 0.7rem;
      margin-top: 2px;
    }

    /* ===== Table ===== */
    .table-container {
      background: rgba(26, 26, 58, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(201, 168, 76, 0.06);
      border-radius: 16px;
      padding: 20px;
      overflow-x: auto;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }

    .table-header h3 {
      color: #F5EDE0;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .table-header h3 i {
      color: #C9A84C;
      margin-left: 8px;
    }

    .table-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }

    .table-toolbar .search-input {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(201, 168, 76, 0.08);
      color: #F5EDE0;
      padding: 8px 16px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.85rem;
      flex: 1;
      min-width: 180px;
      transition: all 0.3s ease;
    }

    .table-toolbar .search-input:focus {
      outline: none;
      border-color: rgba(201, 168, 76, 0.2);
    }

    .table-toolbar .search-input::placeholder {
      color: rgba(245, 237, 224, 0.15);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th, td {
      padding: 10px 12px;
      text-align: right;
      border-bottom: 1px solid rgba(201, 168, 76, 0.04);
    }

    th {
      color: rgba(245, 237, 224, 0.3);
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      color: rgba(245, 237, 224, 0.6);
    }

    tr:hover td {
      background: rgba(201, 168, 76, 0.02);
    }

    /* ===== Badges ===== */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 50px;
      font-size: 0.65rem;
      font-weight: 600;
    }

    .badge-approved {
      background: rgba(16, 185, 129, 0.12);
      color: #34D399;
      border: 1px solid rgba(16, 185, 129, 0.1);
    }

    .badge-pending {
      background: rgba(251, 191, 36, 0.12);
      color: #FBBF24;
      border: 1px solid rgba(251, 191, 36, 0.1);
    }

    .badge-rejected {
      background: rgba(239, 68, 68, 0.12);
      color: #F87171;
      border: 1px solid rgba(239, 68, 68, 0.1);
    }

    .badge-enabled {
      background: rgba(16, 185, 129, 0.12);
      color: #34D399;
      border: 1px solid rgba(16, 185, 129, 0.1);
    }

    .badge-disabled {
      background: rgba(107, 114, 128, 0.12);
      color: #9CA3AF;
      border: 1px solid rgba(107, 114, 128, 0.1);
    }

    .badge-admin {
      background: rgba(201, 168, 76, 0.12);
      color: #C9A84C;
      border: 1px solid rgba(201, 168, 76, 0.1);
    }

    .badge-moderator {
      background: rgba(42, 157, 143, 0.12);
      color: #2A9D8F;
      border: 1px solid rgba(42, 157, 143, 0.1);
    }

    .badge-user {
      background: rgba(107, 114, 128, 0.08);
      color: #9CA3AF;
      border: 1px solid rgba(107, 114, 128, 0.05);
    }

    /* ===== Buttons ===== */
    .btn {
      padding: 4px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .btn-success {
      background: rgba(16, 185, 129, 0.12);
      color: #34D399;
      border: 1px solid rgba(16, 185, 129, 0.1);
    }
    .btn-success:hover {
      background: rgba(16, 185, 129, 0.2);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.12);
      color: #F87171;
      border: 1px solid rgba(239, 68, 68, 0.1);
    }
    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .btn-warning {
      background: rgba(251, 191, 36, 0.12);
      color: #FBBF24;
      border: 1px solid rgba(251, 191, 36, 0.1);
    }
    .btn-warning:hover {
      background: rgba(251, 191, 36, 0.2);
    }

    .btn-primary {
      background: rgba(201, 168, 76, 0.12);
      color: #C9A84C;
      border: 1px solid rgba(201, 168, 76, 0.1);
    }
    .btn-primary:hover {
      background: rgba(201, 168, 76, 0.2);
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.08);
      color: #F87171;
      border: 1px solid rgba(239, 68, 68, 0.05);
    }
    .btn-delete:hover {
      background: rgba(239, 68, 68, 0.15);
    }

    .btn-sm {
      padding: 2px 8px;
      font-size: 0.65rem;
    }

    /* ===== Select ===== */
    .glass-select {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(201, 168, 76, 0.08);
      color: #F5EDE0;
      padding: 4px 8px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.75rem;
      appearance: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .glass-select:focus {
      outline: none;
      border-color: rgba(201, 168, 76, 0.2);
    }

    .glass-select option {
      background: #1A1A3A;
      color: #F5EDE0;
    }

    /* ===== Checkbox ===== */
    .glass-checkbox {
      accent-color: #C9A84C;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: rgba(245, 237, 224, 0.15);
    }

    .empty-state i {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 10px;
      color: rgba(201, 168, 76, 0.1);
    }

    /* ===== Loading ===== */
    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(245, 237, 224, 0.15);
    }

    .loading i {
      font-size: 2rem;
      display: block;
      margin-bottom: 10px;
      color: rgba(201, 168, 76, 0.15);
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        padding: 60px 0 10px;
        border-left: none;
        border-bottom: 1px solid rgba(201, 168, 76, 0.06);
      }

      .main-content {
        margin-right: 0;
        padding-top: 10px;
        padding-left: 16px;
        padding-right: 16px;
      }

      .topbar {
        right: 0;
        position: relative;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 16px;
        height: auto;
      }

      .sidebar-nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 4px 8px;
      }

      .sidebar-nav li {
        margin: 2px;
      }

      .sidebar-nav a {
        padding: 6px 12px;
        font-size: 0.75rem;
        border-radius: 8px;
      }

      .sidebar-nav a.active {
        border-left: none;
        border-bottom: 2px solid #C9A84C;
      }

      .sidebar-footer {
        display: none;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .table-toolbar {
        flex-direction: column;
      }

      .table-toolbar .search-input {
        width: 100%;
      }

      .topbar-title {
        font-size: 0.85rem;
      }
    }

    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }

      .stat-card .stat-number {
        font-size: 1.2rem;
      }

      .table-container {
        padding: 12px;
      }

      th, td {
        padding: 6px 8px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <i class="fas fa-map-location-dot" style="color:#C9A84C;"></i>
      <span class="gold">نقشه</span>
      <span class="cream">گرد</span>
    </div>
    <div class="user-info" id="adminUserDisplay">
      <strong>بارگذاری...</strong>
    </div>
  </div>

  <ul class="sidebar-nav">
    <li><a href="#" onclick="showDashboard()" id="dashboardTab" class="active">
      <span class="icon"><i class="fas fa-chart-pie"></i></span>
      داشبورد
    </a></li>
    <li><a href="#" onclick="showPlaces()" id="placesTab">
      <span class="icon"><i class="fas fa-landmark"></i></span>
      مکان‌ها
      <span class="badge-count" id="pendingPlacesBadge">۰</span>
    </a></li>
    <li><a href="#" onclick="showTravelogues()" id="traveloguesTab">
      <span class="icon"><i class="fas fa-book-open"></i></span>
      سفرنامه‌ها
      <span class="badge-count" id="pendingTraveloguesBadge">۰</span>
    </a></li>
    <li><a href="#" onclick="showReviews()" id="reviewsTab">
      <span class="icon"><i class="fas fa-comments"></i></span>
      نظرات
      <span class="badge-count" id="pendingReviewsBadge">۰</span>
    </a></li>
    <li><a href="#" onclick="showUsers()" id="usersTab">
      <span class="icon"><i class="fas fa-users"></i></span>
      کاربران
    </a></li>
    <li><a href="#" onclick="showVerificationCodes()" id="codesTab">
      <span class="icon"><i class="fas fa-key"></i></span>
      کدهای تایید
    </a></li>
    <li><a href="#" onclick="showSettings()" id="settingsTab">
      <span class="icon"><i class="fas fa-cog"></i></span>
      تنظیمات
    </a></li>
  </ul>

  <div class="sidebar-footer">
    <a href="/">
      <i class="fas fa-arrow-right"></i>
      بازگشت به سایت
    </a>
  </div>
</div>

<!-- ===== TOP BAR ===== -->
<div class="topbar">
  <div class="topbar-title" id="pageTitle">
    <i class="fas fa-chart-pie"></i>
    داشبورد
  </div>
  <div class="topbar-user">
    <span class="username" id="userNameDisplay"></span>
    <span class="role-badge admin" id="userRoleDisplay">ادمین</span>
    <button class="logout-btn" id="logoutBtn">
      <i class="fas fa-sign-out-alt"></i>
      خروج
    </button>
  </div>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-content">
  <div id="dashboardContent"></div>
  <div id="placesContent" style="display:none;"></div>
  <div id="traveloguesContent" style="display:none;"></div>
  <div id="reviewsContent" style="display:none;"></div>
  <div id="usersContent" style="display:none;"></div>
  <div id="codesContent" style="display:none;"></div>
  <div id="settingsContent" style="display:none;"></div>
</div>

<!-- ==================== JAVASCRIPT ==================== -->
<script>
  // ====== Cookie Helpers ======
  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
  }

  function deleteCookie(name) {
    document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
  }

  // ====== Auth Check ======
  const token = getCookie('token');
  const userRole = getCookie('role');
  const username = getCookie('username');

  if (!token) {
    window.location.href = '/login';
  }

  if (userRole !== 'ROLE_ADMIN' && userRole !== 'ROLE_MODERATOR') {
    window.location.href = '/';
  }

  // ====== State ======
  let currentTab = 'dashboard';

  // ====== DOM Elements ======
  const userNameDisplay = document.getElementById('userNameDisplay');
  const userRoleDisplay = document.getElementById('userRoleDisplay');
  const adminUserDisplay = document.getElementById('adminUserDisplay');
  const pageTitle = document.getElementById('pageTitle');

  userNameDisplay.textContent = username || 'کاربر';
  const roleText = userRole === 'ROLE_ADMIN' ? 'ادمین' : 'مدیر';
  userRoleDisplay.textContent = userRole === 'ROLE_ADMIN' ? '👑 ادمین' : '🛡️ مدیر';
  userRoleDisplay.className = `role-badge ${userRole === 'ROLE_ADMIN' ? 'admin' : 'moderator'}`;
  adminUserDisplay.innerHTML = `<strong>${username}</strong> · ${roleText}`;

  // ====== Logout ======
  document.getElementById('logoutBtn').addEventListener('click', () => {
    deleteCookie('token');
    deleteCookie('username');
    deleteCookie('role');
    window.location.href = '/';
  });

  // ====== Tab Management ======
  function setActiveTab(tab) {
    const tabs = ['dashboard', 'places', 'travelogues', 'reviews', 'users', 'codes', 'settings'];
    tabs.forEach(t => {
      const el = document.getElementById(`${t}Tab`);
      if (el) el.classList.remove('active');
    });
    const activeTab = document.getElementById(`${tab}Tab`);
    if (activeTab) activeTab.classList.add('active');

    const titles = {
      dashboard: 'داشبورد',
      places: 'مدیریت مکان‌ها',
      travelogues: 'مدیریت سفرنامه‌ها',
      reviews: 'مدیریت نظرات',
      users: 'مدیریت کاربران',
      codes: 'کدهای تایید',
      settings: 'تنظیمات'
    };
    const icons = {
      dashboard: 'fa-chart-pie',
      places: 'fa-landmark',

  function showContent(content) {
    const ids = ['dashboardContent', 'placesContent', 'traveloguesContent', 'reviewsContent', 'usersContent', 'codesContent', 'settingsContent'];
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    const target = document.getElementById(`${content}Content`);
    if (target) target.style.display = 'block';

  // ====== Toast ======
  function showToast(message, type = 'info') {
    const colors = {
      success: 'bg-emerald-500/20 border-emerald-500/30 text-emerald-400',
      error: 'bg-rose-500/20 border-rose-500/30 text-rose-400',
      info: 'bg-sky-500/20 border-sky-500/30 text-sky-400'
    };

    const toast = document.createElement('div');
    toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-2xl backdrop-blur-xl border ${colors[type] || colors.info} text-sm font-medium transition-all duration-500 transform translate-y-20 opacity-0`;
    toast.textContent = message;
    document.body.appendChild(toast);

    setTimeout(() => {
      toast.classList.remove('translate-y-20', 'opacity-0');
    }, 10);

    setTimeout(() => {
      toast.classList.add('translate-y-20', 'opacity-0');
      setTimeout(() => toast.remove(), 500);
    }, 3500);
  }

    if (!text) return '';
    const div = document.createElement('div');

                                            <option value="ROLE_ADMIN" ${u.role === 'ROLE_ADMIN' ? 'selected' : ''}>👑 ادمین</option>
                                        </select>
                                    ` : `
                                        <span class="badge badge-${u.role === 'ROLE_ADMIN' ? 'admin' : u.role === 'ROLE_MODERATOR' ? 'moderator' : 'user'}">
                                            ${u.role === 'ROLE_ADMIN' ? '👑 ادمین' : u.role === 'ROLE_MODERATOR' ? '🛡️ مدیر' : '👤 کاربر'}
                                        </span>
                                    `}
                                </td>
                                <td style="text-align:center;">
                                    <span class="badge ${u.enabled ? 'badge-enabled' : 'badge-disabled'}">
                                        ${u.enabled ? '✅ فعال' : '❌ غیرفعال'}
                                    </span>
                                </td>
                                <td style="text-align:center;">
                                    <div class="flex flex-wrap gap-1 justify-center">
                                        <button class="btn btn-warning btn-sm" onclick="toggleUserStatus(${u.id})" title="${u.enabled ? 'غیرفعال' : 'فعال'}">
                                            ${u.enabled ? '<i class="fas fa-lock"></i>' : '<i class="fas fa-unlock"></i>'}
                                        </button>
                                        ${isAdmin ? `
                                            <button class="btn btn-delete btn-sm" onclick="deleteUser(${u.id})" title="حذف">
                                                <i class="fas fa-trash-alt"></i>
                                            </button>
                                        ` : ''}
                                    </div>
                                </td>
                            </tr>
                        `).join('')}</tbody>
                    </table>`}
                </div>
            `;
    } catch (error) {
      container.innerHTML = `
                <div class="glass-card p-8 text-center">
                    <i class="fas fa-exclamation-triangle text-3xl text-persian-saffron/30 mb-4 block"></i>
                    <p class="text-persian-cream/30">خطا در بارگذاری کاربران</p>
                </div>
            `;
    }
  }

  // ====== Verification Codes ======
  async function showVerificationCodes() {
    setActiveTab('codes');
    showContent('codes');
    await loadCodes();
  }

  async function loadCodes() {
    const container = document.getElementById('codesContent');
    container.innerHTML = `
            <div class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-3xl text-persian-gold/30 mb-3 block"></i>
                <p class="text-persian-cream/20">در حال بارگذاری...</p>
            </div>
        `;

    try {
      const response = await fetch('/api/admin/verification-codes');
      if (response.status === 401) {
        deleteCookie('token');
        window.location.href = '/login';
        return;
      }
      const codes = await response.json();

      container.innerHTML = `
                <div class="table-container">
                    <div class="table-header">
                        <h3><i class="fas fa-key"></i> کدهای تایید</h3>
                        <div class="flex gap-2">
                            <button class="btn btn-warning btn-sm" onclick="cleanupExpiredCodes()">
                                <i class="fas fa-broom"></i> پاکسازی منقضی
                            </button>
                        </div>
                    </div>
                    ${codes.length === 0 ? `
                        <div class="empty-state">
                            <i class="fas fa-key"></i>
                            هیچ کد تاییدی یافت نشد
                        </div>
                    ` : `
                    <table>
                        <thead><tr>
                            <th>ایمیل</th>
                            <th style="text-align:center;">کد</th>
                            <th style="text-align:center;">نوع</th>
                            <th style="text-align:center;">تاریخ انقضا</th>
                            <th style="text-align:center;">وضعیت</th>
                            <th style="text-align:center;">عملیات</th>
                        </tr></thead>
                        <tbody>${codes.map(c => {
        const isExpired = new Date(c.expiresAt) < new Date();
        const statusClass = c.used ? 'badge-approved' : (isExpired ? 'badge-rejected' : 'badge-pending');
        const statusText = c.used ? '✓ استفاده شده' : (isExpired ? '✗ منقضی' : '⏳ معتبر');
        return `
                            <tr>
                                <td style="color:rgba(245,237,224,0.4);">${escapeHtml(c.email)}</td>
                                <td style="text-align:center; color:#C9A84C; font-weight:700; font-family:monospace; font-size:1.1rem;">${c.code}</td>
                                <td style="text-align:center; color:rgba(245,237,224,0.3); font-size:0.8rem;">${c.type === 'REGISTER' ? '📝 ثبت‌نام' : '🔑 بازیابی'}</td>
                                <td style="text-align:center; color:rgba(245,237,224,0.3); font-size:0.8rem;">${new Date(c.expiresAt).toLocaleString('fa-IR')}</td>
                                <td style="text-align:center;"><span class="badge ${statusClass}">${statusText}</span></td>
                                <td style="text-align:center;">
                                    <button class="btn btn-delete btn-sm" onclick="deleteCode(${c.id})" title="حذف">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </td>
                            </tr>
                            `;
      }).join('')}</tbody>
                    </table>`}
                </div>
            `;
    } catch (error) {
      container.innerHTML = `
                <div class="glass-card p-8 text-center">
                    <i class="fas fa-exclamation-triangle text-3xl text-persian-saffron/30 mb-4 block"></i>
                    <p class="text-persian-cream/30">خطا در بارگذاری کدها</p>
                </div>
            `;
    }
  }

  // ====== Settings ======
  async function showSettings() {

    document.getElementById('settingsContent').innerHTML = `
            <div class="table-container">
                <div class="table-header">
                    <h3><i class="fas fa-cog"></i> تنظیمات</h3>
                </div>
                <div style="padding:10px 0;">
                    <div style="background:rgba(255,255,255,0.02); padding:16px; border-radius:12px; margin-bottom:14px; border:1px solid rgba(201,168,76,0.04);">
                        <h4 style="color:#F5EDE0; font-size:0.95rem; margin-bottom:8px;">
                            <i class="fas fa-user-cog text-persian-gold ml-2"></i>
                            اطلاعات کاربر
                        </h4>
                        <p style="color:rgba(245,237,224,0.3); font-size:0.85rem;">
                            <strong style="color:rgba(245,237,224,0.5);">نام کاربری:</strong> ${username}
                        </p>

                        </h4>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; font-size:0.8rem; color:rgba(245,237,224,0.3);">
                            <div>${userRole === 'ROLE_ADMIN' || userRole === 'ROLE_MODERATOR' ? '✅' : '❌'} مشاهده داشبورد</div>
                            <div>${userRole === 'ROLE_ADMIN' || userRole === 'ROLE_MODERATOR' ? '✅' : '❌'} مدیریت مکان‌ها</div>
                            <div>${userRole === 'ROLE_ADMIN' || userRole === 'ROLE_MODERATOR' ? '✅' : '❌'} مدیریت سفرنامه‌ها</div>
                            <div>${userRole === 'ROLE_ADMIN' || userRole === 'ROLE_MODERATOR' ? '✅' : '❌'} مدیریت نظرات</div>
                            <div>${userRole === 'ROLE_ADMIN' ? '✅' : '❌'} مدیریت کاربران</div>
                            <div>${userRole === 'ROLE_ADMIN' ? '✅' : '❌'} عملیات گروهی</div>
                            <div>${userRole === 'ROLE_ADMIN' ? '✅' : '❌'} مدیریت کدهای تایید</div>
                        </div>
                    </div>
                </div>
            </div>
        `;
  }

  // ====== Actions ======
  async function approvePlace(id) {
    try {
      const response = await fetch(`/api/admin/places/${id}/approve`, { method: 'PUT' });
      if (response.ok) {
        showToast('✅ مکان تایید شد', 'success');
        loadPlaces();
      }
    } catch (error) {
      showToast('❌ خطا در تایید مکان', 'error');
    }
  }

  async function rejectPlace(id) {
    try {
      const response = await fetch(`/api/admin/places/${id}/reject`, { method: 'PUT' });
      if (response.ok) {
        showToast('✅ مکان رد شد', 'success');
        loadPlaces();
      }
    } catch (error) {
      showToast('❌ خطا در رد مکان', 'error');
    }
  }

  async function deletePlace(id) {
    if (!confirm('آیا از حذف این مکان مطمئن هستید؟')) return;
    try {
      const response = await fetch(`/api/admin/places/${id}`, { method: 'DELETE' });
      if (response.ok) {
        showToast('✅ مکان حذف شد', 'success');
        loadPlaces();

      showToast('❌ خطا در حذف مکان', 'error');

      showToast('❌ خطا در حذف کد', 'error');

    if (!confirm('آیا از حذف تمام کدهای منقضی مطمئن هستید؟')) return;
    try {
      const response = await fetch('/api/admin/verification-codes/cleanup', { method: 'DELETE' });
      if (response.ok) {
        showToast('✅ کدهای منقضی پاکسازی شدند', 'success');
        loadCodes();
      }
    } catch (error) {
      showToast('❌ خطا در پاکسازی کدها', 'error');
    }
  }

  // ====== Bulk Actions ======
  function toggleAll(type, checked) {
    document.querySelectorAll(`.${type}-check`).forEach(el => el.checked = checked);
  }

  function getCheckedIds(type) {
    return Array.from(document.querySelectorAll(`.${type}-check:checked`)).map(el => parseInt(el.value));
  }

  async function bulkApprovePlaces() {
    const ids = getCheckedIds('place');
    if (ids.length === 0) {
      showToast('⚠️ حداقل یک مکان را انتخاب کنید', 'error');
      return;
    }
    if (!confirm(`آیا از تایید ${ids.length} مکان مطمئن هستید؟`)) return;
    try {
      const response = await fetch('/api/admin/places/bulk-approve', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(ids)
      });
      if (response.ok) {
        showToast(`✅ ${ids.length} مکان تایید شد`, 'success');
        loadPlaces();
      }
    } catch (error) {
      showToast('❌ خطا در تایید گروهی', 'error');
    }
  }

  async function bulkApproveTravelogues() {
    const ids = getCheckedIds('travelogue');
    if (ids.length === 0) {
      showToast('⚠️ حداقل یک سفرنامه را انتخاب کنید', 'error');
      return;

  }

  async function bulkApproveReviews() {
    const ids = getCheckedIds('review');
    if (ids.length === 0) {
      showToast('⚠️ حداقل یک نظر را انتخاب کنید', 'error');

  // ====== Start ======
  document.addEventListener('DOMContentLoaded', showDashboard);
