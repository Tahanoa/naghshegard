<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | نقشه گرد</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'persian-navy': '#0A0A1A',
                        'persian-dark': '#111128',
                        'persian-night': '#1A1A3A',
                        'persian-teal': '#1A6B6B',
                        'persian-turquoise': '#2A9D8F',
                        'persian-saffron': '#D4A373',
                        'persian-gold': '#C9A84C',
                        'persian-lapis': '#1B2A4A',
                        'persian-rose': '#BC6C8C',
                        'persian-cream': '#F5EDE0',
                    },
                    fontFamily: {
                        'persian': ['Vazirmatn', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', system-ui, sans-serif;
            background: linear-gradient(135deg, #0A0A1A 0%, #111128 50%, #0A0A1A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* پس‌زمینه با ستاره */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    radial-gradient(1.5px 1.5px at 10% 20%, rgba(255,255,255,0.4), transparent),
                    radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.3), transparent),
                    radial-gradient(2px 2px at 40% 10%, rgba(255,255,255,0.5), transparent),
                    radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.2), transparent),
                    radial-gradient(1.5px 1.5px at 70% 30%, rgba(255,255,255,0.4), transparent),
                    radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,0.3), transparent);
            background-size: 100% 100%;
            opacity: 0.4;
            z-index: 0;
        }

        /* المان‌های تزئینی */
        .decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.05;
            font-size: 12rem;
        }

        .decoration-1 {
            top: 5%;
            right: 3%;
            transform: rotate(15deg);
        }

        .decoration-2 {
            bottom: 5%;
            left: 3%;
            transform: rotate(-10deg);
        }

        /* افکت شیشه‌ای */
        .glass-card {
            background: rgba(26, 26, 58, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(201, 168, 76, 0.12);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6), 0 0 40px rgba(201, 168, 76, 0.03);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.15);
            color: #F5EDE0;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            outline: none;
            border-color: #C9A84C;
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1), 0 0 20px rgba(201, 168, 76, 0.05);
            background: rgba(255, 255, 255, 0.08);
        }

        .glass-input::placeholder {
            color: rgba(245, 237, 224, 0.3);
        }

        .glass-input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #1A1A3A inset !important;
            -webkit-text-fill-color: #F5EDE0 !important;
        }

        /* انیمیشن‌ها */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .step-content {
            animation: fadeSlideUp 0.5s ease;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #C9A84C, #D4A373);
            color: #0A0A1A;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(201, 168, 76, 0.25);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(201, 168, 76, 0.1);
            color: #D4A373;
            border: 1px solid rgba(201, 168, 76, 0.2);
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(201, 168, 76, 0.2);
            transform: translateY(-2px);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* کد ورودی */
        .code-input {
            letter-spacing: 12px;
            font-size: 1.8rem;
            text-align: center;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(201, 168, 76, 0.15);
            border-radius: 16px;
            padding: 16px;
            color: #F5EDE0;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }

        .code-input:focus {
            border-color: #C9A84C;
            box-shadow: 0 0 30px rgba(201, 168, 76, 0.05);
        }

        /* اسکرول بار */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0A0A1A;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #C9A84C, #D4A373);
            border-radius: 10px;
        }

        /* ریسپانسیو */
        @media (max-width: 640px) {
            .glass-card {
                padding: 24px 20px !important;
            }
            .decoration {
                display: none;
            }
            .code-input {
                font-size: 1.4rem;
                letter-spacing: 8px;
                padding: 12px;
                max-width: 220px;
            }
        }
    </style>
</head>
<body>

<!-- المان‌های تزئینی -->
<div class="decoration decoration-1">
    <i class="fas fa-mosque"></i>
</div>
<div class="decoration decoration-2">
    <i class="fas fa-mountain"></i>
</div>

<!-- ==================== کارت ورود ==================== -->
<div class="relative z-10 w-full max-w-md">

    <div class="glass-card rounded-3xl p-8 md:p-10">

        <!-- هدر -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-3 mb-4">
                <div class="relative">
                    <i class="fas fa-map-location-dot text-3xl text-persian-gold"></i>
                    <i class="fas fa-star text-[8px] text-persian-saffron absolute -top-1 -right-1"></i>
                </div>
                <span class="text-2xl font-extrabold">
                    <span class="text-persian-gold">نقشه</span>
                    <span class="text-persian-cream">گرد</span>
                </span>
            </div>

            <h2 class="text-2xl md:text-3xl font-bold text-persian-cream">
                <i class="fas fa-sign-in-alt text-persian-gold ml-2"></i>
                خوش آمدید
            </h2>
            <p class="text-persian-cream/40 text-sm mt-1">
                به جمع گردشگران ایران بپیوندید
            </p>
        </div>

        <!-- Alert‌ها -->
        <div id="successAlert" class="hidden bg-emerald-500/10 border border-emerald-500/20 rounded-2xl p-3 mb-4 text-emerald-400 text-sm flex items-center gap-3">
            <i class="fas fa-check-circle text-emerald-400"></i>
            <span id="successMessage"></span>
        </div>
        <div id="errorAlert" class="hidden bg-rose-500/10 border border-rose-500/20 rounded-2xl p-3 mb-4 text-rose-400 text-sm flex items-center gap-3">
            <i class="fas fa-exclamation-circle text-rose-400"></i>
            <span id="errorMessage"></span>
        </div>
        <div id="infoAlert" class="hidden bg-sky-500/10 border border-sky-500/20 rounded-2xl p-3 mb-4 text-sky-400 text-sm flex items-center gap-3">
            <i class="fas fa-info-circle text-sky-400"></i>
            <span id="infoMessage"></span>
        </div>

        <!-- استپ ۱: فرم ورود -->
        <div class="step-content active" id="step1">
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-persian-cream/70 text-sm font-medium mb-1.5">
                        <i class="fas fa-user text-persian-gold ml-1.5"></i>
                        نام کاربری یا ایمیل
                    </label>
                    <input type="text" id="username" name="username" required
                           class="glass-input w-full px-4 py-3 rounded-2xl text-persian-cream text-sm"
                           placeholder="نام کاربری یا ایمیل خود را وارد کنید">
                </div>

                <div>
                    <label class="block text-persian-cream/70 text-sm font-medium mb-1.5">
                        <i class="fas fa-lock text-persian-gold ml-1.5"></i>
                        رمز عبور
                    </label>
                    <input type="password" id="password" name="password" required
                           class="glass-input w-full px-4 py-3 rounded-2xl text-persian-cream text-sm"
                           placeholder="رمز عبور خود را وارد کنید">
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-persian-cream/40 cursor-pointer hover:text-persian-cream/60 transition-colors">
                        <input type="checkbox" id="rememberMe" class="accent-persian-gold w-4 h-4 rounded border-persian-gold/30 bg-transparent">
                        <span>مرا به خاطر بسپار</span>
                    </label>
                    <button type="button" id="forgotPasswordLink" class="text-persian-gold/60 hover:text-persian-gold transition-colors font-medium">
                        رمز عبور را فراموش کردید؟
                    </button>
                </div>

                <button type="submit" class="btn-primary w-full py-3.5 rounded-2xl font-bold text-sm flex items-center justify-center gap-2" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    ورود به حساب کاربری
                </button>
            </form>
        </div>

        <!-- استپ ۲: فراموشی رمز - ارسال کد -->
        <div class="step-content" id="step2">
            <div class="text-center mb-6">
                <div class="inline-flex items-center gap-2 bg-persian-gold/5 border border-persian-gold/10 rounded-full px-4 py-1.5 mb-3">
                    <i class="fas fa-key text-persian-gold/60 text-xs"></i>
                    <span class="text-persian-cream/50 text-xs">بازیابی رمز عبور</span>
                </div>
                <h3 class="text-xl font-bold text-persian-cream">🔑 بازیابی رمز عبور</h3>
                <p class="text-persian-cream/40 text-sm mt-1">
                    ایمیل خود را وارد کنید تا کد بازیابی دریافت کنید
                </p>
            </div>

            <form id="forgotForm" class="space-y-4">
                <div>
                    <label class="block text-persian-cream/70 text-sm font-medium mb-1.5">
                        <i class="fas fa-envelope text-persian-gold ml-1.5"></i>
                        ایمیل
                    </label>
                    <input type="email" id="resetEmail" required
                           class="glass-input w-full px-4 py-3 rounded-2xl text-persian-cream text-sm"
                           placeholder="example@domain.com">
                </div>

                <button type="submit" class="btn-primary w-full py-3.5 rounded-2xl font-bold text-sm flex items-center justify-center gap-2" id="forgotBtn">
                    <i class="fas fa-paper-plane"></i>
                    ارسال کد بازیابی
                </button>

                <button type="button" id="backToLoginBtn" class="btn-secondary w-full py-3 rounded-2xl font-medium text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-arrow-right"></i>
                    بازگشت به ورود
                </button>
            </form>
        </div>

        <!-- استپ ۳: فراموشی رمز - تایید کد -->
        <div class="step-content" id="step3">
            <div class="text-center mb-6">
                <div class="inline-flex items-center gap-2 bg-persian-gold/5 border border-persian-gold/10 rounded-full px-4 py-1.5 mb-3">
                    <i class="fas fa-check-circle text-persian-gold/60 text-xs"></i>
                    <span class="text-persian-cream/50 text-xs">تایید کد</span>
                </div>
                <h3 class="text-xl font-bold text-persian-cream">✅ تایید کد بازیابی</h3>
                <p class="text-persian-cream/40 text-sm mt-1">
                    کد ۶ رقمی ارسال شده به
                    <strong class="text-persian-gold" id="resetEmailDisplay"></strong>
                </p>
            </div>

            <form id="resetForm" class="space-y-4">
                <div class="flex justify-center">
                    <input type="text" id="resetCode" class="code-input" maxlength="6" placeholder="۱۲۳۴۵۶" required>
                </div>

                <div>
                    <label class="block text-persian-cream/70 text-sm font-medium mb-1.5">
                        <i class="fas fa-lock text-persian-gold ml-1.5"></i>
                        رمز عبور جدید
                    </label>
                    <input type="password" id="newPassword" minlength="6" required
                           class="glass-input w-full px-4 py-3 rounded-2xl text-persian-cream text-sm"
                           placeholder="حداقل ۶ کاراکتر">
                </div>

                <div>
                    <label class="block text-persian-cream/70 text-sm font-medium mb-1.5">
                        <i class="fas fa-check-double text-persian-gold ml-1.5"></i>
                        تکرار رمز عبور جدید
                    </label>
                    <input type="password" id="confirmNewPassword" required
                           class="glass-input w-full px-4 py-3 rounded-2xl text-persian-cream text-sm"
                           placeholder="رمز عبور را دوباره وارد کنید">
                </div>

                <button type="submit" class="btn-primary w-full py-3.5 rounded-2xl font-bold text-sm flex items-center justify-center gap-2" id="resetBtn">
                    <i class="fas fa-check-circle"></i>
                    تغییر رمز عبور
                </button>

                <div class="flex flex-col gap-2">
                    <button type="button" id="resendResetBtn" class="btn-secondary w-full py-3 rounded-2xl font-medium text-sm flex items-center justify-center gap-2">
                        <i class="fas fa-rotate-right"></i>
                        ارسال مجدد کد
                    </button>
                    <button type="button" id="backToLoginFromResetBtn" class="text-persian-cream/30 hover:text-persian-cream/60 transition-colors text-sm flex items-center justify-center gap-2">
                        <i class="fas fa-arrow-right"></i>
                        بازگشت به ورود
                    </button>
                </div>
            </form>
        </div>

        <!-- لینک‌های پایین -->
        <div class="mt-6 pt-5 border-t border-persian-gold/10 flex flex-col sm:flex-row items-center justify-between gap-3 text-sm">
            <div class="flex items-center gap-2 text-persian-cream/40">
                <i class="fas fa-user-plus text-persian-gold/40"></i>
                <span>حساب کاربری ندارید؟</span>
                <a href="/register" class="text-persian-gold hover:text-persian-saffron transition-colors font-medium">
                    ثبت‌نام
                    <i class="fas fa-arrow-left mr-1 text-xs"></i>
                </a>
            </div>
            <a href="/" class="text-persian-cream/30 hover:text-persian-cream/60 transition-colors flex items-center gap-1.5">
                <i class="fas fa-home text-xs"></i>
                بازگشت به خانه
            </a>
        </div>

    </div>

</div>

<!-- ==================== جاوااسکریپت ==================== -->
<script>
    // ========== توابع کمکی ==========
    function setCookie(name, value, days) {
        let expires = "";
        if (days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "") + expires + "; path=/";
    }

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    // ========== متغیرها ==========
    let resetEmail = '';
    let resendTimer = 60;
    let resendInterval = null;

    // ========== المان‌ها ==========
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    const loginForm = document.getElementById('loginForm');
    const forgotForm = document.getElementById('forgotForm');
    const resetForm = document.getElementById('resetForm');
    const loginBtn = document.getElementById('loginBtn');
    const forgotBtn = document.getElementById('forgotBtn');
    const resetBtn = document.getElementById('resetBtn');
    const resendResetBtn = document.getElementById('resendResetBtn');
    const resetEmailDisplay = document.getElementById('resetEmailDisplay');

    // ========== توابع نمایش پیام ==========
    function showSuccess(message) {
        const alert = document.getElementById('successAlert');
        document.getElementById('successMessage').textContent = message;
        alert.classList.remove('hidden');
        document.getElementById('errorAlert').classList.add('hidden');
        document.getElementById('infoAlert').classList.add('hidden');
        setTimeout(() => alert.classList.add('hidden'), 5000);
    }

    function showError(message) {
        const alert = document.getElementById('errorAlert');
        document.getElementById('errorMessage').textContent = message;
        alert.classList.remove('hidden');
        document.getElementById('successAlert').classList.add('hidden');
        document.getElementById('infoAlert').classList.add('hidden');
        setTimeout(() => alert.classList.add('hidden'), 5000);
    }

    function showInfo(message) {
        const alert = document.getElementById('infoAlert');
        document.getElementById('infoMessage').textContent = message;
        alert.classList.remove('hidden');
        document.getElementById('successAlert').classList.add('hidden');
        document.getElementById('errorAlert').classList.add('hidden');
        setTimeout(() => alert.classList.add('hidden'), 5000);
    }

    // ========== مدیریت استپ‌ها ==========
    function goToStep(step) {
        document.querySelectorAll('.step-content').forEach(el => {
            el.classList.remove('active');
        });

        if (step === 1) {
            step1.classList.add('active');
        } else if (step === 2) {
            step2.classList.add('active');
        } else if (step === 3) {
            step3.classList.add('active');
        }

        // پاک کردن alert‌ها
        document.getElementById('errorAlert').classList.add('hidden');
        document.getElementById('successAlert').classList.add('hidden');
        document.getElementById('infoAlert').classList.add('hidden');
    }

    // ========== تایمر ارسال مجدد ==========
    function startResetTimer() {
        resendTimer = 60;
        resendResetBtn.disabled = true;
        resendResetBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${resendTimer} ثانیه`;

        if (resendInterval) clearInterval(resendInterval);

        resendInterval = setInterval(() => {
            resendTimer--;
            if (resendTimer <= 0) {
                clearInterval(resendInterval);
                resendResetBtn.disabled = false;
                resendResetBtn.innerHTML = '<i class="fas fa-rotate-right"></i> ارسال مجدد کد';
            } else {
                resendResetBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${resendTimer} ثانیه`;
            }
        }, 1000);
    }

    // ========== ورود ==========
    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('rememberMe').checked;

        if (!username || !password) {
            showError('لطفاً نام کاربری و رمز عبور را وارد کنید');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> در حال ورود...';

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: username,
                    password: password,
                    rememberMe: rememberMe
                })
            });

            if (response.ok) {
                const data = await response.json();
                const days = rememberMe ? 30 : 7;
                setCookie('token', data.token, days);
                setCookie('username', data.username, days);
                setCookie('role', data.role, days);

                showSuccess('🎉 خوش آمدید! در حال انتقال به صفحه اصلی...');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } else {
                const error = await response.text();
                showError(error || 'نام کاربری یا رمز عبور اشتباه است');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> ورود به حساب کاربری';
            }
        } catch (error) {
            showError('خطا در ارتباط با سرور. لطفاً مجدداً تلاش کنید.');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> ورود به حساب کاربری';
        }
    });

    // ========== فراموشی رمز - ارسال کد ==========
    forgotForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('resetEmail').value.trim();

        if (!email || !email.includes('@')) {
            showError('لطفاً یک ایمیل معتبر وارد کنید');
            return;
        }

        forgotBtn.disabled = true;
        forgotBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> در حال ارسال...';

        try {
            const response = await fetch('/api/auth/forgot-password/send-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            if (response.ok) {
                resetEmail = email;
                resetEmailDisplay.textContent = email;
                showInfo('کد بازیابی به ایمیل شما ارسال شد. لطفاً صندوق ورودی خود را بررسی کنید.');
                goToStep(3);
                startResetTimer();
            } else {
                const error = await response.text();
                showError(error || 'خطا در ارسال کد بازیابی');
                forgotBtn.disabled = false;
                forgotBtn.innerHTML = '<i class="fas fa-paper-plane"></i> ارسال کد بازیابی';
            }
        } catch (error) {
            showError('خطا در ارتباط با سرور. لطفاً مجدداً تلاش کنید.');
            forgotBtn.disabled = false;
            forgotBtn.innerHTML = '<i class="fas fa-paper-plane"></i> ارسال کد بازیابی';
        }
    });

    // ========== فراموشی رمز - تایید کد و تغییر رمز ==========
    resetForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const code = document.getElementById('resetCode').value.trim();
        const newPassword = document.getElementById('newPassword').value;
        const confirmNewPassword = document.getElementById('confirmNewPassword').value;

        if (code.length !== 6 || !/^\d{6}$/.test(code)) {
            showError('لطفاً کد ۶ رقمی را به درستی وارد کنید');
            return;
        }

        if (newPassword.length < 6) {
            showError('رمز عبور جدید باید حداقل ۶ کاراکتر باشد');
            return;
        }

        if (newPassword !== confirmNewPassword) {
            showError('رمز عبور و تکرار آن مطابقت ندارند');
            return;
        }

        resetBtn.disabled = true;
        resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> در حال تغییر رمز...';

        try {
            const response = await fetch('/api/auth/forgot-password/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: resetEmail,
                    code: code,
                    newPassword: newPassword
                })
            });

            if (response.ok) {
                showSuccess('✅ رمز عبور با موفقیت تغییر کرد! در حال انتقال به صفحه ورود...');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                const error = await response.text();
                showError(error || 'کد تایید نامعتبر است');
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-check-circle"></i> تغییر رمز عبور';
            }
        } catch (error) {
            showError('خطا در ارتباط با سرور. لطفاً مجدداً تلاش کنید.');
            resetBtn.disabled = false;
            resetBtn.innerHTML = '<i class="fas fa-check-circle"></i> تغییر رمز عبور';
        }
    });

    // ========== ارسال مجدد کد بازیابی ==========
    resendResetBtn.addEventListener('click', async function() {
        if (resendResetBtn.disabled) return;

        resendResetBtn.disabled = true;
        resendResetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> در حال ارسال...';

        try {
            const response = await fetch('/api/auth/forgot-password/send-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: resetEmail })
            });

            if (response.ok) {
                showInfo('کد بازیابی جدید به ایمیل شما ارسال شد.');
                startResetTimer();
            } else {
                const error = await response.text();
                showError(error || 'خطا در ارسال مجدد کد');
                resendResetBtn.disabled = false;
                resendResetBtn.innerHTML = '<i class="fas fa-rotate-right"></i> ارسال مجدد کد';
            }
        } catch (error) {
            showError('خطا در ارتباط با سرور');
            resendResetBtn.disabled = false;
            resendResetBtn.innerHTML = '<i class="fas fa-rotate-right"></i> ارسال مجدد کد';
        }
    });

    // ========== دکمه‌های ناوبری ==========
    document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
        e.preventDefault();
        goToStep(2);
    });

    document.getElementById('backToLoginBtn').addEventListener('click', function() {
        goToStep(1);
    });

    document.getElementById('backToLoginFromResetBtn').addEventListener('click', function() {
        goToStep(1);
    });

    // ========== ورود خودکار با Enter در کد ==========
    document.getElementById('resetCode').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            resetForm.dispatchEvent(new Event('submit'));
        }
    });

    // ========== محدود کردن ورودی کد به عدد ==========
    document.getElementById('resetCode').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
    });

    // ========== چک کردن توکن برای هدایت خودکار ==========
    document.addEventListener('DOMContentLoaded', function() {
        const token = getCookie('token');
        if (token) {
            // اگر کاربر قبلاً وارد شده، به صفحه اصلی برو
            window.location.href = '/';
        }
    });
</script>

</body>
</html>
