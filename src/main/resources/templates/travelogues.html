<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سفرنامه‌ها | نقشه گرد</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'persian-navy': '#0A0A1A',
                        'persian-dark': '#111128',
                        'persian-night': '#1A1A3A',
                        'persian-teal': '#1A6B6B',
                        'persian-turquoise': '#2A9D8F',
                        'persian-saffron': '#D4A373',
                        'persian-gold': '#C9A84C',
                        'persian-lapis': '#1B2A4A',
                        'persian-rose': '#BC6C8C',
                        'persian-cream': '#F5EDE0',
                    },
                    fontFamily: {
                        'persian': ['Vazirmatn', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', system-ui, sans-serif;
            background: linear-gradient(135deg, #0A0A1A 0%, #111128 50%, #0A0A1A 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* پس‌زمینه با ستاره */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    radial-gradient(1.5px 1.5px at 10% 20%, rgba(255,255,255,0.4), transparent),
                    radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.3), transparent),
                    radial-gradient(2px 2px at 40% 10%, rgba(255,255,255,0.5), transparent),
                    radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.2), transparent),
                    radial-gradient(1.5px 1.5px at 70% 30%, rgba(255,255,255,0.4), transparent),
                    radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,0.3), transparent);
            background-size: 100% 100%;
            opacity: 0.3;
            z-index: 0;
        }

        /* Navbar */
        .navbar {
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(201, 168, 76, 0.08);
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            z-index: 1000;
            padding: 0.75rem 2rem;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0.75rem 1rem;
            }
        }

        /* Glass Card for items */
        .glass-card {
            background: rgba(26, 26, 58, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(201, 168, 76, 0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .glass-card:hover {
            transform: translateY(-8px) rotateX(2deg) rotateY(-2deg);
            border-color: rgba(201, 168, 76, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(201, 168, 76, 0.03);
        }

        /* Glass Input */
        .glass-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(201, 168, 76, 0.12);
            color: #F5EDE0;
            transition: all 0.3s ease;
            width: 100%;
            padding: 12px 18px;
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .glass-input:focus {
            outline: none;
            border-color: #C9A84C;
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.08), 0 0 30px rgba(201, 168, 76, 0.03);
            background: rgba(255, 255, 255, 0.06);
        }

        .glass-input::placeholder {
            color: rgba(245, 237, 224, 0.25);
        }

        /* Filter Buttons */
        .filter-btn {
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(201, 168, 76, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(245, 237, 224, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .filter-btn:hover {
            border-color: rgba(201, 168, 76, 0.2);
            color: rgba(245, 237, 224, 0.7);
        }

        .filter-btn.active {
            background: rgba(201, 168, 76, 0.12);
            border-color: rgba(201, 168, 76, 0.3);
            color: #C9A84C;
        }

        .filter-btn i {
            margin-left: 6px;
        }

        /* Image container */
        .card-image-wrapper {
            position: relative;
            height: 200px;
            overflow: hidden;
            background: linear-gradient(135deg, #1A2A4A, #2A4A6A);
        }

        .card-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .glass-card:hover .card-image-wrapper img {
            transform: scale(1.05);
        }

        .card-image-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 4rem;
            color: rgba(201, 168, 76, 0.2);
        }

        /* Stats */
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: rgba(245, 237, 224, 0.3);
            font-size: 0.75rem;
        }

        .stat-item i {
            font-size: 0.7rem;
        }

        /* Pagination */
        .pagination-btn {
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(201, 168, 76, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(245, 237, 224, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 0.85rem;
            min-width: 40px;
        }

        .pagination-btn:hover {
            border-color: rgba(201, 168, 76, 0.2);
            color: rgba(245, 237, 224, 0.7);
        }

        .pagination-btn.active {
            background: rgba(201, 168, 76, 0.12);
            border-color: rgba(201, 168, 76, 0.3);
            color: #C9A84C;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            background: rgba(26, 26, 58, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid rgba(201, 168, 76, 0.06);
        }

        .empty-state .icon {
            font-size: 4rem;
            color: rgba(201, 168, 76, 0.15);
            margin-bottom: 16px;
        }

        .empty-state h3 {
            color: rgba(245, 237, 224, 0.4);
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: rgba(245, 237, 224, 0.2);
            font-size: 0.9rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0A0A1A;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #C9A84C, #D4A373);
            border-radius: 10px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .card-image-wrapper {
                height: 160px;
            }
            .empty-state {
                padding: 40px 20px;
            }
            .empty-state .icon {
                font-size: 3rem;
            }
            .filter-buttons {
                flex-wrap: wrap;
            }
            .filter-btn {
                font-size: 0.75rem;
                padding: 6px 14px;
            }
        }
    </style>
</head>

<script>
    // ========== کوکی‌ها ==========
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    function deleteCookie(name) {
        document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
    }

    // ========== مدیریت احراز هویت ==========
    const token = getCookie('token');
    const userRole = getCookie('role');

    const authButtons = document.getElementById('authButtons');
    const mobileAuthButtons = document.getElementById('mobileAuthButtons');
    const userLinks = document.getElementById('userLinks');
    const mobileUserLinks = document.getElementById('mobileUserLinks');
    const logoutBtn = document.getElementById('logoutBtn');
    const mobileLogoutBtn = document.getElementById('mobileLogoutBtn');

    if (token) {
        if (authButtons) authButtons.style.display = 'none';
        if (mobileAuthButtons) mobileAuthButtons.style.display = 'none';
        if (userLinks) userLinks.style.display = 'flex';
        if (mobileUserLinks) mobileUserLinks.style.display = 'block';
        if (logoutBtn) logoutBtn.style.display = 'inline-flex';
        if (mobileLogoutBtn) mobileLogoutBtn.style.display = 'block';
    }

    function handleLogout() {
        deleteCookie('token');
        deleteCookie('username');
        deleteCookie('role');
        window.location.href = '/';
    }

    logoutBtn?.addEventListener('click', handleLogout);
    mobileLogoutBtn?.addEventListener('click', handleLogout);

    // ========== منوی موبایل ==========
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    let menuOpen = false;

    hamburgerBtn?.addEventListener('click', () => {
        menuOpen = !menuOpen;
        mobileMenu.classList.toggle('hidden');
        hamburgerBtn.innerHTML = menuOpen ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
    });

    // ========== توابع کمکی ==========
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(dateString) {
        if (!dateString) return '';
        try {
            const date = new Date(dateString);
            return date.toLocaleDateString('fa-IR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        } catch {
            return dateString;
        }
    }

    // ========== متغیرها ==========
    let currentPage = 0;
    let currentFilter = 'latest';
    let currentKeyword = '';
    let totalPages = 1;
    const pageSize = 9;

    // ========== المان‌ها ==========
    const container = document.getElementById('traveloguesContainer');
    const paginationEl = document.getElementById('pagination');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const clearSearchBtn = document.getElementById('clearSearchBtn');

    // ========== فیلترها ==========
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            currentPage = 0;
            currentKeyword = '';
            searchInput.value = '';
            loadTravelogues();
        });
    });

    // ========== جستجو ==========
    searchBtn.addEventListener('click', () => {
        currentKeyword = searchInput.value.trim();
        currentPage = 0;
        loadTravelogues();
    });

    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            currentKeyword = searchInput.value.trim();
            currentPage = 0;
            loadTravelogues();
        }
    });

    clearSearchBtn.addEventListener('click', () => {
        searchInput.value = '';
        currentKeyword = '';
        currentPage = 0;
        loadTravelogues();
    });

    // ========== بارگذاری سفرنامه‌ها ==========
    async function loadTravelogues() {
        container.innerHTML = `
            <div class="flex items-center justify-center py-20">
                <div class="text-center">
                    <i class="fas fa-spinner fa-spin text-4xl text-persian-gold/30 mb-4 block"></i>
                    <p class="text-persian-cream/30">در حال بارگذاری سفرنامه‌ها...</p>
                </div>
            </div>
        `;
        paginationEl.innerHTML = '';

        try {
            let url;
            let response;

            if (currentKeyword) {
                // جستجو با کلمه کلیدی
                url = `/api/travelogues/public/search?keyword=${encodeURIComponent(currentKeyword)}&page=${currentPage}&size=${pageSize}`;
                response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    displayTravelogues(data.content);
                    displayPagination(data);
                }
            } else {
                // فیلترها
                switch(currentFilter) {
                    case 'most-viewed':
                        url = `/api/travelogues/public/most-viewed?limit=${pageSize}`;
                        response = await fetch(url);
                        if (response.ok) {
                            const data = await response.json();
                            displayTravelogues(data);
                            paginationEl.innerHTML = '';
                        }
                        break;
                    case 'most-liked':
                        url = `/api/travelogues/public/most-liked?limit=${pageSize}`;
                        response = await fetch(url);
                        if (response.ok) {
                            const data = await response.json();
                            displayTravelogues(data);
                            paginationEl.innerHTML = '';
                        }
                        break;
                    default:
                        url = `/api/travelogues/public?page=${currentPage}&size=${pageSize}`;
                        response = await fetch(url);
                        if (response.ok) {
                            const data = await response.json();
                            displayTravelogues(data.content);
                            displayPagination(data);
                        }
                }
            }
        } catch (error) {
            console.error('Error loading travelogues:', error);
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon"><i class="fas fa-wifi-slash"></i></div>
                    <h3>خطا در ارتباط با سرور</h3>
                    <p>لطفاً اتصال اینترنت خود را بررسی کنید</p>
                </div>
            `;
        }
    }

    // ========== نمایش سفرنامه‌ها ==========
    function displayTravelogues(travelogues) {
        if (!travelogues || travelogues.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon"><i class="fas fa-book-open"></i></div>
                    <h3>هیچ سفرنامه‌ای یافت نشد</h3>
                    <p>${currentKeyword ? `نتیجه‌ای برای "${currentKeyword}" یافت نشد` : 'هنوز سفرنامه‌ای ثبت نشده است'}</p>
                </div>
            `;
            return;
        }

        container.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                ${travelogues.map(t => {
            const coverUrl = t.coverImageUrl || null;
            const isApproved = t.approved !== false;

            return `
                        <div class="glass-card rounded-2xl overflow-hidden cursor-pointer" onclick="location.href='/travelogue/${t.id}'">
                            <div class="card-image-wrapper">
                                ${coverUrl ?
                `<img src="${coverUrl}" alt="${escapeHtml(t.title)}" onerror="this.parentElement.innerHTML='<div class=\\'card-image-placeholder\\'><i class=\\'fas fa-book-open\\'></i></div>'">` :
                `<div class="card-image-placeholder"><i class="fas fa-book-open"></i></div>`
            }
                                ${!isApproved ? `
                                    <div class="absolute top-3 left-3 bg-persian-gold/10 backdrop-blur-sm border border-persian-gold/20 rounded-full px-3 py-1 text-xs text-persian-cream/60">
                                        <i class="fas fa-clock"></i> در انتظار تایید
                                    </div>
                                ` : ''}
                            </div>

                            <div class="p-5">
                                <h3 class="text-lg font-bold text-persian-cream hover:text-persian-gold transition-colors line-clamp-2 mb-2">
                                    ${escapeHtml(t.title)}
                                </h3>

                                <div class="flex items-center justify-between text-xs text-persian-cream/30 mb-2">
                                    <span><i class="fas fa-user ml-1"></i> ${escapeHtml(t.authorUsername)}</span>
                                    <span><i class="fas fa-calendar ml-1"></i> ${formatDate(t.createdAt)}</span>
                                </div>

                                <p class="text-persian-cream/40 text-sm leading-relaxed line-clamp-2 mb-3">
                                    ${escapeHtml((t.content || '').substring(0, 120))}${(t.content || '').length > 120 ? '...' : ''}
                                </p>

                                <div class="flex items-center gap-4 pt-3 border-t border-persian-gold/5">
                                    <span class="stat-item">
                                        <i class="fas fa-eye"></i>
                                        ${t.viewCount || 0}
                                    </span>
                                    <span class="stat-item">
                                        <i class="fas fa-heart text-rose-400/40"></i>
                                        ${t.likeCount || 0}
                                    </span>
                                </div>
                            </div>
                        </div>
                    `;
        }).join('')}
            </div>
        `;
    }

    // ========== صفحه‌بندی ==========
    function displayPagination(pageData) {
        if (!pageData || pageData.totalPages <= 1) {
            paginationEl.innerHTML = '';
            return;
        }

        totalPages = pageData.totalPages;
        let html = '';

        // دکمه قبلی
        if (currentPage > 0) {
            html += `<button class="pagination-btn" onclick="goToPage(${currentPage - 1})">
                <i class="fas fa-chevron-right"></i>
            </button>`;
        }

        // شماره صفحات
        const startPage = Math.max(0, currentPage - 2);
        const endPage = Math.min(totalPages - 1, currentPage + 2);

        if (startPage > 0) {
            html += `<button class="pagination-btn" onclick="goToPage(0)">۱</button>`;
            if (startPage > 1) {
                html += `<span class="text-persian-cream/20 px-1">...</span>`;
            }
        }

        for (let i = startPage; i <= endPage; i++) {
            html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i + 1}</button>`;
        }

        if (endPage < totalPages - 1) {
            if (endPage < totalPages - 2) {
                html += `<span class="text-persian-cream/20 px-1">...</span>`;
            }
            html += `<button class="pagination-btn" onclick="goToPage(${totalPages - 1})">${totalPages}</button>`;
        }

        // دکمه بعدی
        if (currentPage < totalPages - 1) {
            html += `<button class="pagination-btn" onclick="goToPage(${currentPage + 1})">
                <i class="fas fa-chevron-left"></i>
            </button>`;
        }

        paginationEl.innerHTML = html;
    }

    // ========== رفتن به صفحه ==========
    window.goToPage = function(page) {
        currentPage = page;
        loadTravelogues();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // ========== بارگذاری اولیه ==========
    document.addEventListener('DOMContentLoaded', loadTravelogues);
</script>

</body>
</html>
